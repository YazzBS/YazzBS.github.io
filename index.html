<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>YazzBS</title>

<style>

body{
margin:0;
font-family:Arial;
background:#081c4a;
color:white;
text-align:center;
}

nav{
background:#ffd000;
padding:15px;
font-weight:bold;
}

h1{
font-size:45px;
color:#ffd000;
}

.boton{
display:inline-block;
background:#ffd000;
color:#081c4a;
padding:12px 20px;
margin:10px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.seccion{
margin-top:50px;
}

.card{
display:inline-block;
background:#0e2a70;
padding:15px;
margin:10px;
border-radius:10px;
width:120px;
}

#game{
margin:auto;
width:300px;
height:200px;
background:#0e2a70;
border:3px solid #ffd000;
position:relative;
overflow:hidden;
}

.star{
position:absolute;
font-size:25px;
cursor:pointer;
}

input{
padding:10px;
border-radius:5px;
border:none;
}

button{
padding:10px;
background:#ffd000;
border:none;
border-radius:5px;
cursor:pointer;
}

footer{
margin-top:40px;
padding:20px;
background:#020f2f;
}

</style>

</head>

<body>

<nav>
YazzBS 🎮
</nav>

<h1>YazzBS</h1>
<p>🎮 TikTok Gaming Creator</p>

<a class="boton" href="https://www.tiktok.com/@yazzbs2" target="_blank">
Ver mi TikTok
</a>

<div class="seccion">
<h2>📊 Estadísticas</h2>

<div class="card">Videos<br>7</div>
<div class="card">Likes<br>20+</div>
<div class="card">Vistas<br>1000+</div>
<div class="card">Seguidores<br>4</div>

</div>

<div class="seccion">
<h2>⭐ Minijuego</h2>

<div id="game"></div>
<p>Puntos: <span id="score">0</span></p>
</div>

<div class="seccion">
<h2>🔑 Canjear código</h2>

<input id="codigo" placeholder="Escribe el código">
<button onclick="canjear()">Canjear</button>

<p id="resultado"></p>
</div>

<footer>
<p style="color:#ffd000; font-size:20px; font-weight:bold;">
🔥 ¡SÍGUEME EN TIKTOK COMO @yazzbs2! 🔥
</p>
</footer>

<script>

// 🎮 MINIJUEGO
let score=0;
const game=document.getElementById("game");
const scoreText=document.getElementById("score");

function spawnStar(){

const star=document.createElement("div");
star.className="star";
star.innerHTML="⭐";

star.style.left=Math.random()*260+"px";
star.style.top=Math.random()*160+"px";

star.onclick=function(){
score++;
scoreText.textContent=score;
star.remove();
};

game.appendChild(star);

setTimeout(()=>{
if(star.parentNode){
star.remove();
}
},2000);

}

setInterval(spawnStar,1200);


// 🔑 CÓDIGOS SECRETOS
function canjear(){

let codigo=document.getElementById("codigo").value.toUpperCase();
let resultado=document.getElementById("resultado");

if(codigo==="ELSECRETO"){
window.location.href="verdadero-lore.html";
}

else if(codigo==="ESHORADEJUGAR"){
resultado.innerHTML="🎮 ¡Minijuego secreto desbloqueado!";
}

else if(codigo==="SALUDITOS"){
resultado.innerHTML="👋 ¡YazzBS podría enviarte un saludo!";
}

else{
resultado.innerHTML="❌ Código incorrecto";
}

}

</script>

</body>
</html>
